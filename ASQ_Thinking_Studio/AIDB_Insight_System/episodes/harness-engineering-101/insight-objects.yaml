  timestamp: ~3:00
claim_type: interpretation
confidence:
  level: high
  reasoning: >
    NLW frames this as an intentional lineage — prompt engineering → context
    engineering → harness engineering — and backs it with concrete product
    examples throughout the episode.
distortion_risk: >
  Could be read as "prompt engineering is dead." The actual claim is that
  the dominant frame of what matters has shifted, not that earlier skills
