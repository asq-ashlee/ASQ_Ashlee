id: AIDB-2026-04-HE101-008
source:
  episode: Harness Engineering 101
  speaker: NLW (host) citing Viv at LangChain
  timestamp: ~12:00
claim_type: fact
confidence:
  level: high
  reasoning: >
    NLW references a specific LangChain post and attributes the
    three-layer harness breakdown (information layer, execution layer,
    feedback layer) to Etna Labs. These are clearly sourced structural
    descriptions, not NLW's own claims.
distortion_risk: >
  Low distortion risk — this is a definitional framework, not an argument.
  Risk is in oversimplifying: the three layers are not equal in maturity
  or difficulty. The feedback layer (evaluation, tracing, observability)
  is the hardest and least commonly implemented.
claim: >
  A harness has three layers: information (what the agent can see and do —
  memory, context, tools), execution (how work is decomposed and recovered —
  orchestration, guardrails), and feedback (how the system improves over
  time — evaluation, verification, observability). Most current harnesses
  are strong on information, weak on feedback.
