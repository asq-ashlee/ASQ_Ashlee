id: AIDB-2026-05-AAW-006
source:
  episode: AI's New Acceleration Phase (weekly recap)
  speaker: NLW (host) citing Ethan Mollick and a widely circulated chart
  timestamp: ~24:00
claim_type: fact
confidence:
  level: medium
  reasoning: >
    Ethan Mollick's estimates are sourced to best public estimates of LLM resource
    use — reasonable but not independently verifiable here. The chart comparing
    annual data center water use to golf courses, almonds, and lawns is widely
    cited but NLW does not name the original source. Confidence is medium because
    the underlying data is sound enough to share but the methodology is labeled
    as estimative, not measured.
distortion_risk: >
  Could be read as "AI has no environmental impact" or "data center concerns are
  wrong." The actual claim is about scale and proportion. NLW explicitly says
  communities should still ask hard questions. The data does not eliminate
  environmental concerns — it reframes the water use argument specifically. Energy
  use, land use, and other impacts are not addressed by this data.
claim: >
  The water used to solve the Erdős problem was approximately 3–31 liters —
  less than three almonds' worth. Annual data center water use is less than a
  fifth of golf courses, about a tenth of almonds, and about a twentieth of
  lawns. The "AI uses a lot of water" narrative, while directionally true in
  absolute terms, is disproportionate relative to other water-intensive industries
  few people question.
cross_episode_flag: >
  LOW — no existing objects to link to. Flag if a future macro-story arc covers
  AI's public perception or environmental policy.
